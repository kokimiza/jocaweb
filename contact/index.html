<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – jocarium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=Newsreader:ital,wght@0,400;0,500;1,400&family=Zen+Antique&family=JetBrains+Mono:wght@400;600&display=swap">
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <script src="../assets/js/config.js" defer></script>
  <script src="../assets/js/components.js" defer></script>
  <script src="../assets/js/notice.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
  <script src="../assets/js/i18n.js" defer></script>
</head>
<body data-page="contact">
  <site-header base=".."></site-header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1 data-i18n="contact.header.title">Contact</h1>
        <p data-i18n="contact.header.desc">お問い合わせ・コラボレーションのご相談はこちら</p>
      </div>
    </section>

    <section class="content-section">
      <div class="container">
        <form class="contact-form" id="contactForm" novalidate>
          <div class="form-group">
            <label for="name" data-i18n="contact.form.name">Name <abbr data-i18n="contact.form.required" title="必須">*</abbr></label>
            <input type="text" id="name" name="name" autocomplete="name" required>
          </div>
          <div class="form-group">
            <label for="email" data-i18n="contact.form.email">Email <abbr data-i18n="contact.form.required" title="必須">*</abbr></label>
            <input type="email" id="email" name="email" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="subject" data-i18n="contact.form.subject">Subject <abbr data-i18n="contact.form.required" title="必須">*</abbr></label>
            <input type="text" id="subject" name="subject" required>
          </div>
          <div class="form-group">
            <label for="brand" data-i18n="contact.form.brand">Brand</label>
            <select id="brand" name="brand">
              <option value="" data-i18n="contact.form.brandSelect">選択してください</option>
              <option value="kokimiza">kokimiza</option>
              <option value="gutzgutz">Gutzgutz</option>
              <option value="bpm">BURNING PIZZA METHODS</option>
              <option value="systems">jocarium Systems</option>
              <option value="other" data-i18n="contact.form.brandOther">その他</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message" data-i18n="contact.form.message">Message <abbr data-i18n="contact.form.required" title="必須">*</abbr></label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-with-icon">
            <img src="../assets/icons/send.svg" width="18" height="18" alt="" aria-hidden="true" class="icon-btn">
            <span data-i18n="contact.form.submit">Send Message</span>
          </button>
        </form>
      </div>
    </section>

    <section class="content-section">
      <div class="container">
        <h2 data-i18n="contact.faq.heading">FAQ</h2>
        <div class="faq-items">
          <details class="faq-item">
            <summary data-i18n="contact.faq.q1">返信にどれくらいかかりますか？</summary>
            <p data-i18n="contact.faq.a1">通常 3〜5 営業日以内にご返信します。</p>
          </details>
          <details class="faq-item">
            <summary data-i18n="contact.faq.q2">コラボレーションは受け付けていますか？</summary>
            <p data-i18n="contact.faq.a2">はい。クリエイティブ・技術両面のパートナーシップを常に歓迎しています。</p>
          </details>
          <details class="faq-item">
            <summary data-i18n="contact.faq.q3">カスタム制作は対応できますか？</summary>
            <p data-i18n="contact.faq.a3">各ブランドでニーズに合わせたカスタムソリューションを提供できます。詳細はフォームからご相談ください。</p>
          </details>
          <details class="faq-item">
            <summary data-i18n="contact.faq.q4">オープンソースへのコントリビューションは？</summary>
            <p data-i18n="contact.faq.a4">jocarium Systems のプロジェクトへのコントリビューションを歓迎しています。各リポジトリをご確認ください。</p>
          </details>
        </div>
      </div>
    </section>
  </main>

  <site-footer base=".."></site-footer>
</body>
</html>
