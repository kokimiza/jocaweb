<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact – jocarium</title>
  <link rel="stylesheet" href="../assets/css/reset.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/theme.css">
  <script src="../assets/js/config.js" defer></script>
  <script src="../assets/js/components.js" defer></script>
  <script src="../assets/js/main.js" defer></script>
</head>
<body>
  <site-header base=".."></site-header>

  <main>
    <section class="page-header">
      <div class="container">
        <h1>Contact</h1>
        <p>お問い合わせ・コラボレーションのご相談はこちら</p>
      </div>
    </section>

    <section class="content-section">
      <div class="container">
        <form class="contact-form" id="contactForm" novalidate>
          <div class="form-group">
            <label for="name">Name <abbr title="必須">*</abbr></label>
            <input type="text" id="name" name="name" autocomplete="name" required>
          </div>
          <div class="form-group">
            <label for="email">Email <abbr title="必須">*</abbr></label>
            <input type="email" id="email" name="email" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="subject">Subject <abbr title="必須">*</abbr></label>
            <input type="text" id="subject" name="subject" required>
          </div>
          <div class="form-group">
            <label for="brand">Brand</label>
            <select id="brand" name="brand">
              <option value="">Select…</option>
              <option value="kokimiza">kokimiza</option>
              <option value="gutzgutz">Gutzgutz</option>
              <option value="bpm">BURNING PIZZA METHODS</option>
              <option value="systems">jocarium Systems</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Message <abbr title="必須">*</abbr></label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-with-icon">
            <img src="../assets/icons/send.svg" width="18" height="18" alt="" aria-hidden="true" class="icon-btn">
            Send Message
          </button>
        </form>
      </div>
    </section>

    <section class="content-section">
      <div class="container">
        <h2>FAQ</h2>
        <div class="faq-items">
          <details class="faq-item">
            <summary>返信にどれくらいかかりますか？</summary>
            <p>通常 3〜5 営業日以内にご返信します。</p>
          </details>
          <details class="faq-item">
            <summary>コラボレーションは受け付けていますか？</summary>
            <p>はい。クリエイティブ・技術両面のパートナーシップを常に歓迎しています。</p>
          </details>
          <details class="faq-item">
            <summary>カスタム制作は対応できますか？</summary>
            <p>各ブランドでニーズに合わせたカスタムソリューションを提供できます。詳細はフォームからご相談ください。</p>
          </details>
          <details class="faq-item">
            <summary>オープンソースへのコントリビューションは？</summary>
            <p>jocarium Systems のプロジェクトへのコントリビューションを歓迎しています。各リポジトリをご確認ください。</p>
          </details>
        </div>
      </div>
    </section>
  </main>

  <site-footer base=".."></site-footer>
</body>
</html>
